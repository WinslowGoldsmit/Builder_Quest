<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5C94FC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Builder Quest">
<meta name="description" content="AI Builder Curriculum - Project-based personal development system">
<title>AI Builder Quest</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header" id="app-header"></header>
<nav class="nav-bar" id="nav-bar"></nav>

<main class="main-content">

  <section id="dashboard" class="section active">
    <div id="dashboard-content"></div>
  </section>

  <section id="today" class="section">
    <div id="yesterday-banner"></div>
    <div id="today-content"></div>
    <div id="daily-summary-section"></div>
  </section>

  <section id="curriculum" class="section">
    <div id="curriculum-content"></div>
  </section>

  <section id="progress" class="section">
    <div id="progress-content"></div>
  </section>

  <section id="prompt" class="section">
    <div id="prompt-content"></div>
  </section>

  <section id="settings" class="section">
    <div id="settings-content"></div>
  </section>

</main>

<script src="curriculum-data.js"></script>
<script src="app.js"></script>

</body>
</html>
